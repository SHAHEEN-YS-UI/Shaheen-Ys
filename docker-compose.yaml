services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  shaheen-ys-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/shaheen-ys-ui/shaheen-ys-ui:${WEBUI_DOCKER_TAG-main}
    container_name: shaheen-ys-ui
    volumes:
      - shaheen-ys-ui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'WEBUI_SECRET_KEY='
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  shaheen-ys-ui: {}
